# Open Engine stack profile — absorbs air bootstrap MCP-inject + agent-code→harness wiring.
#
# This profile replaces the two runtime concerns that lived in
# agentic-harness/air/cmd/bootstrap.go (Phase 1, consolidation-plan.md):
#
#   1. mcpinject.Inject()  — write per-editor MCP configs pointing tool traffic
#                            at the Agentic-Sentry policy gateway + Linear MCP.
#   2. agents.Link()       — fan the canonical AGENTS.md out to harness-specific
#                            instruction file paths.
#
# When an Open Engine Linear task is claimed, the cron/paste shim (or a future
# Omnigent-native runner) creates a session via POST /v1/sessions, stamps it with
# the openengine.issue label, injects this profile, and passes the captured
# session_id into the runner's context.
#
# TODOs (Lane B — omnigent/omnigent/harness_aliases.py + sessions.py):
#   - TODO(lane-b): harness_for_agent_code(agent_code) must resolve the
#     Open Engine agent-code suffix (e.g. "alex-claude" → strip operator prefix
#     → suffix "claude" → canonical harness "claude-native") and return the
#     harness id used in the executor block below.
#   - TODO(lane-b): POST /v1/sessions must stamp the openengine.issue label
#     when an issue id is present in the session-create payload.
#
# Spec status: stub / Phase 1 draft.  Values marked TODO require Lane B
# (harness_aliases.py suffix mapping) before this profile is executable.

profile_version: 1
name: openengine-stack
description: >-
  Stack profile for Open Engine governed sessions.  Injects the Linear MCP
  and the Agentic-Sentry policy gateway into the agent's MCP config, maps
  the Open Engine agent-code to the correct Omnigent harness, and stamps
  openengine.issue at session create.

# ── MCP injection ───────────────────────────────────────────────────────────
#
# Replaces air/internal/mcpinject.Inject(): writes MCP server entries that
# the harness will pick up at session start.  Both servers are injected for
# every Open Engine session.
#
# Sentry gateway URL falls back to the env var AIR_SENTRY_GATEWAY_URL, then
# to the default http://127.0.0.1:8080/mcp (matching mcpinject.DefaultGatewayURL).
# The Linear MCP token is read from LINEAR_MCP_TOKEN (or the operator secret
# store in managed-host mode).
mcp_servers:
  - name: agentic-sentry
    # ponytail: URL from env at runtime; no baked-in default in the profile itself
    url: "${AIR_SENTRY_GATEWAY_URL:-http://127.0.0.1:8080/mcp}"
    transport: streamable-http
    auth:
      type: bearer
      token_env: GATEWAY_API_TOKEN
    inject_into: [claude-native, codex-native, claude-sdk]

  - name: linear
    # Linear's remote MCP endpoint.  The runner reads issue context and writes
    # receipts (AGENT CLAIMED, AGENT DONE, …) through this server.
    url: "https://mcp.linear.app/sse"
    transport: sse
    auth:
      type: bearer
      token_env: LINEAR_MCP_TOKEN
    inject_into: [claude-native, codex-native, claude-sdk]

# ── Agent-code → harness mapping ────────────────────────────────────────────
#
# Replaces agents.Link(): resolves the Open Engine agent-code suffix to the
# Omnigent canonical harness id.
#
# Convention (matching air/internal/agents Known list):
#   agent-code suffix  →  omnigent harness id
#
# The operator prefix is stripped before lookup (e.g. "alex-claude" → "claude").
# TODO(lane-b): wire harness_for_agent_code() in sessions.py to use this table
# instead of a hardcoded lookup.
agent_code_harness_map:
  claude:    claude-native   # Claude Code CLI (claude-native bridge)
  codex:     codex-native    # OpenAI Codex CLI (codex-native bridge)
  cursor:    claude-sdk      # Cursor: run via claude-sdk orchestrator
  copilot:   copilot         # GitHub Copilot SDK harness
  gemini:    claude-sdk      # Gemini CLI: headless via claude-sdk proxy
  kiro:      kiro-native     # Kiro native TUI harness
  windsurf:  claude-sdk      # Windsurf: headless via claude-sdk

# Default harness when the suffix does not match any key above.
default_harness: claude-native

# ── Session labeling ─────────────────────────────────────────────────────────
#
# The shim (or Omnigent session-create path) stamps the session with these
# labels at create time.  The openengine.issue value is filled from the
# LINEAR_ISSUE_ID env var or the session-create payload field issue_id.
#
# TODO(lane-b): sessions.py POST /v1/sessions must read issue_id from the
# payload and emit label openengine.issue=<value> in session_lifecycle events.
session_labels:
  openengine.issue: "${OE_TASK_REF}"   # provider-qualified, e.g. linear:ENG-123; empty → label omitted

# ── Guardrails (Open Engine boundary enforcement) ────────────────────────────
#
# The existing Python native_policy_hook.py (PreToolUse) enforces ALLOW/DENY/ASK
# at the tool surface.  At Milestone 1, named MCP tool boundaries (delete_*,
# publish_*, etc.) are enforced by name; opaque shell-command classification is
# deferred to OE-2 (Rego opa_delegate).
#
# This section documents the intended policy binding; the actual enforcement is
# in omnigent/policies/ (Python) and will migrate to the shared Rego bundle at
# OE-2.
guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        # ponytail: reuse existing blast_radius builtin; OE boundary rules added
        # in policies/builtins/safety.py per the M1 spec (open-engine-integration-plan.md).
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: true   # Open Engine sessions: always ASK before push/deploy
    opa_oe_boundaries:
      type: function
      on: [tool_call]
      function:
        # OE-2: delegate the OE boundaries to the shared OPA bundle (native-plane
        # oe_decision). require_approval (publish/email/deploy) -> human ASK via
        # the server elicitation gate; delete/credentials/billing -> DENY. Gated
        # by OMNIGENT_OPA_DELEGATE_MODE (off default). ACTIVATION also requires the
        # session to opt in via the openengine.profile=<name> label: the Lane B
        # loader (omnigent/server/profiles.py) attaches this guardrails.policies
        # block as session policies at create. Enforcement is AND-gated on
        # (mode=enforce) AND (the openengine.profile label).
        path: omnigent.policies.builtins.opa.opa_require_approval
  ask_timeout: 86400        # 24-hour hold window (human may be async)

# ── Skills (agent instruction fanning) ───────────────────────────────────────
#
# Replaces air skills link/sync: the pod-bundle skills from agentic-harness
# are surfaced as Omnigent skills on the session.  Each skill is a SKILL.md
# from agentic-harness/pod-bundle/skills/.
#
# At Phase 1 these are referenced by path; a future ARD-backed registry will
# resolve them by URN (urn:air:cbc:content:pod-bundle).
skills_source:
  type: local_path
  # ponytail: path relative to the agentic-harness checkout; absolute path or
  # env-override needed for managed-host mode.
  path: "${AGENTIC_HARNESS_ROOT:-../agentic-harness}/pod-bundle/skills"
